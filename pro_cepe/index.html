<!DOCTYPE html>
<html>
<head>
    <title>Salon Booking System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Salon Booking System</h1>
    <p>Choose your favorite salon and book an appointment</p>
</header>

<div class="salons">

    <div class="salon">
        <h2>Royal Salon</h2>
        <p>⭐ 4.5 | 2 km away</p>
        <button onclick="goBooking('Royal Salon')">Book Appointment</button>
    </div>

    <div class="salon">
        <h2>Style Hub</h2>
        <p>⭐ 4.2 | 3 km away</p>
        <button onclick="goBooking('Style Hub')">Book Appointment</button>
    </div>

    <div class="salon">
        <h2>Glamour Cut</h2>
        <p>⭐ 4.7 | 1.5 km away</p>
        <button onclick="goBooking('Glamour Cut')">Book Appointment</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
